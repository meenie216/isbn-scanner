<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>ISBN Scanner</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header>
    <h1>📚 ISBN Scanner</h1>
    <nav>
      <button class="tab active" data-tab="scan">Scan</button>
      <button class="tab"        data-tab="browse">Boxes</button>
      <button class="tab"        data-tab="search">Search</button>
      <button class="tab"        data-tab="unresolved">Unresolved</button>
    </nav>
  </header>

  <!-- ── SCAN TAB ──────────────────────────────────────────────── -->
  <main id="pane-scan" class="pane active">

    <section id="scan-meta-section">
      <form id="scan-form">
        <div class="field-row">
          <label>
            Box *
            <input id="field-box" type="text" placeholder="e.g. B12" required />
          </label>
          <label>
            Location
            <input id="field-location" type="text" placeholder="e.g. Garage" list="locations-list" />
            <datalist id="locations-list"></datalist>
          </label>
        </div>
        <label>
          Notes
          <textarea id="field-notes" rows="2" placeholder="Optional…"></textarea>
        </label>
      </form>
    </section>

    <section id="scanner-section">
      <div id="viewfinder-wrap" class="hidden">
        <video id="viewfinder" playsinline autoplay muted></video>
        <div id="viewfinder-overlay">
          <div class="corner tl"></div><div class="corner tr"></div>
          <div class="corner bl"></div><div class="corner br"></div>
        </div>
        <div id="ocr-capture-overlay" class="hidden">
          <div class="ocr-spinner"></div>
          <p id="ocr-status-msg">Reading…</p>
        </div>
        <div id="scan-flash"></div>
        <div id="cooldown-bar"></div>
      </div>
      <div id="scanner-controls">
        <button id="btn-start-scan" class="btn-primary" disabled>📷 Start Scanner</button>
        <button id="btn-stop-scan"  class="btn-secondary hidden">■ Stop Scanner</button>
        <button id="btn-ocr"        class="btn-secondary hidden" title="Scan cover/title page for ISBN">🔤 OCR</button>
      </div>
      <p id="scanner-status" class="status-hint"></p>
      <div id="scan-toast" class="hidden" aria-live="polite"></div>
    </section>

    <section id="manual-entry-section">
      <form id="manual-form">
        <div class="field-row manual-entry">
          <label style="flex:1">
            Manual barcode
            <input id="field-barcode" type="text" placeholder="Type barcode…" />
          </label>
          <button type="submit" class="btn-primary" style="align-self:flex-end">Submit</button>
        </div>
      </form>
    </section>

    <!-- Last scan result — updates in place, never hides the camera -->
    <section id="last-scan-section" class="hidden">
      <h3 class="section-heading">Last scan</h3>
      <div id="last-scan-card"></div>
    </section>

    <p id="deploy-time" class="deploy-stamp"></p>

  </main>

  <!-- ── BOXES TAB ──────────────────────────────────────────────── -->
  <main id="pane-browse" class="pane">

    <div id="browse-header">
      <button id="btn-back-boxes" class="btn-secondary hidden">← Boxes</button>
      <h2 id="browse-title">Boxes</h2>
    </div>

    <div id="browse-results">
      <p class="hint">Loading…</p>
    </div>

    <div id="browse-pagination">
      <button id="btn-prev-page" class="btn-secondary hidden">← Prev</button>
      <span   id="page-indicator"></span>
      <button id="btn-next-page" class="btn-secondary hidden">Next →</button>
    </div>

  </main>

  <!-- ── SEARCH TAB ─────────────────────────────────────────────── -->
  <main id="pane-search" class="pane">

    <div id="search-bar">
      <input id="search-input" type="search" placeholder="Title, author, director, artist…" autocomplete="off" />
    </div>

    <div id="search-results">
      <p class="hint">Start typing to search your collection.</p>
    </div>

    <div id="search-pagination">
      <button id="btn-search-prev" class="btn-secondary hidden">← Prev</button>
      <span   id="search-page-indicator"></span>
      <button id="btn-search-next" class="btn-secondary hidden">Next →</button>
    </div>

  </main>

  <!-- ── UNRESOLVED TAB ────────────────────────────────────────────── -->
  <main id="pane-unresolved" class="pane">

    <h2>Unresolved Scans</h2>
    <p class="hint" id="unresolved-hint">Items that couldn't be looked up automatically.</p>

    <div id="unresolved-list"></div>

    <div id="unresolved-pagination">
      <button id="btn-unresolved-prev" class="btn-secondary hidden">← Prev</button>
      <span   id="unresolved-page-indicator"></span>
      <button id="btn-unresolved-next" class="btn-secondary hidden">Next →</button>
    </div>

    <!-- Inline resolve form (hidden until a card's Resolve button is clicked) -->
    <div id="resolve-modal" class="hidden">
      <div id="resolve-modal-backdrop"></div>
      <div id="resolve-modal-box">
        <h3>Resolve: <span id="resolve-barcode-label"></span></h3>

        <label>Type
          <select id="resolve-type">
            <option value="book">📚 Book</option>
            <option value="dvd">🎬 DVD / Blu-ray</option>
            <option value="cd">🎵 CD</option>
            <option value="other">📦 Other</option>
          </select>
        </label>

        <label>Title *<input id="resolve-title" type="text" placeholder="Title" /></label>

        <div id="resolve-fields-book">
          <label>Author(s) <input id="resolve-authors" type="text" placeholder="Comma-separated" /></label>
          <label>Publisher <input id="resolve-publisher" type="text" placeholder="Publisher" /></label>
        </div>
        <div id="resolve-fields-dvd" class="hidden">
          <label>Director <input id="resolve-director" type="text" placeholder="Director" /></label>
          <label>Format
            <select id="resolve-format">
              <option>DVD</option>
              <option>Blu-ray</option>
              <option>4K UHD</option>
              <option>VHS</option>
            </select>
          </label>
        </div>
        <div id="resolve-fields-cd" class="hidden">
          <label>Artist <input id="resolve-artist" type="text" placeholder="Artist" /></label>
          <label>Label  <input id="resolve-label"  type="text" placeholder="Label" /></label>
        </div>
        <div id="resolve-fields-other" class="hidden">
          <label>Brand    <input id="resolve-brand"    type="text" placeholder="Brand" /></label>
          <label>Category <input id="resolve-category" type="text" placeholder="Category" /></label>
        </div>

        <label>Year      <input id="resolve-year"      type="number" placeholder="e.g. 2003" min="1800" max="2099" /></label>
        <label>Cover URL <input id="resolve-cover-url" type="url"    placeholder="https://…" /></label>

        <div id="resolve-actions">
          <button id="btn-resolve-cancel"  class="btn-secondary">Cancel</button>
          <button id="btn-resolve-submit"  class="btn-primary">Save</button>
        </div>
        <p id="resolve-error" class="hint hidden"></p>
      </div>
    </div>

  </main>

  <script src="js/config.js"></script>
  <script src="https://unpkg.com/@zxing/library@0.20.0/umd/index.min.js"></script>
  <script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
  <script src="js/scanner.js"></script>
  <script src="js/ocr.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
